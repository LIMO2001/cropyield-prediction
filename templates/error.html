{% extends 'master.html' %}
{% block content %}

<div class="container-fluid py-5">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-danger text-white py-4 text-center">
                        <i class="fas fa-exclamation-triangle fa-3x mb-2"></i>
                        <h2 class="mb-0">Error</h2>
                    </div>
                    <div class="card-body p-5 text-center">
                        <p class="lead text-muted mb-4">{{ error }}</p>
                        <div class="d-flex justify-content-center gap-3">
                            <a href="/" class="btn btn-primary">
                                <i class="fas fa-home me-2"></i>Go Home
                            </a>
                            <a href="/predict" class="btn btn-outline-success">
                                <i class="fas fa-chart-line me-2"></i>Try Again
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
